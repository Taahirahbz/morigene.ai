<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact Form</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'IBM Plex Sans', sans-serif;
  background: url('images/halodna.jpg') center/cover no-repeat;
  display: flex;
  justify-content: flex-start;
  align-items: center;
}

/* ================= PARTICLES ================= */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.8;
  animation: float 4s infinite ease-in-out;
}

.particle.white {
  background: white;
  box-shadow: 0 0 6px rgba(255,255,255,0.8);
}

.particle.magenta {
  background: #FF5AB1;
  box-shadow: 0 0 8px rgba(255,91,177,0.9);
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ================= GLASS BOX ================= */
.form-container {
  margin-left: 3.8%; /* moved slightly more left */
  width: 450px;
  height: 450px;
  padding: 2.5rem;
  background: rgba(255,255,255,0.12); /* slightly clearer */
  backdrop-filter: blur(6px); /* reduced blur */
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.25);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* helps center thank-you message */
  z-index: 10;
  box-shadow: 0 0 30px rgba(255,255,255,0.1);

  animation: floatTilt 12s ease-in-out infinite;
}

.form-container:hover {
  box-shadow: 0 0 35px rgba(255,91,177,0.6);
}

@keyframes floatTilt {
  0%,100% { transform: translateY(0px); }
  25% { transform: translateY(-6px); }
  50% { transform: translateY(3px); }
  75% { transform: translateY(-4px); }
}

/* ================= FORM ================= */
h2 {
  color: #ffffff;
  margin: 0;
}

form {
  width: 100%;
  display: flex;
  flex-direction: column;
  margin-top: 0.8rem;
}

/* FIELD */
.field {
  width: 100%;
  margin-top: 0.4rem;
}

.field label {
  display: block;
  text-align: center;
  color: #ffffff;
  font-size: 0.95rem;
  margin-bottom: 0.2rem;
}

.field input,
.field textarea {
  width: 100%;
  margin-top: 0.3rem;
  padding: 0.7rem 1rem;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.15);
  color: #ffffff;
  outline: none;
  text-align: center;
}

.field textarea {
  min-height: 95px;
  text-align: left;
}

.field input:focus,
.field textarea:focus {
  border: 1px solid rgba(255,91,177,0.9);
  box-shadow: 0 0 12px rgba(255,91,177,0.8);
}

/* BUTTON */
button.send-btn {
  background: rgba(255,91,177,0.6);
  border: 1px solid rgba(255,91,177,0.7);
  padding: 0.7rem 2rem;
  border-radius: 50px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  width: 60%;
  align-self: center;
  margin-top: 1rem;
}

button.send-btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 0 25px rgba(255,91,177,0.7);
}

/* THANK YOU INSIDE BOX */
#thankBox {
  display: none;
  text-align: center;
  color: white;
  font-size: 1.1rem;
  font-weight: 500;
}

/* BACK BUTTON */
.back-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 0.7rem 1.5rem;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);
  color: white;
  font-weight: 600;
  cursor: pointer;
  z-index: 10;
}

.back-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 20px rgba(255,91,177,0.6);
}

/* MOBILE */
@media (max-width: 500px) {
  body { justify-content: center; }

  .form-container {
    width: 90vw;
    height: auto;
    margin-left: 0;
  }
}
</style>

</head>
<body>

<div id="particles"></div>

<div class="form-container">
  <h2 id="formTitle">Contact Us</h2>

  <form id="contactForm">
    <div class="field">
      <label>Name</label>
      <input type="text" required>
    </div>

```
<div class="field">
  <label>Email</label>
  <input type="email" required>
</div>

<div class="field">
  <label>Subject</label>
  <input type="text" required>
</div>

<div class="field">
  <label>Message</label>
  <textarea required></textarea>
</div>

<button type="submit" class="send-btn">Send</button>
```

  </form>

  <div id="thankBox">
    Thank you for contacting Morigene,<br><br>
    we shall get back to you as soon as possible ✨
  </div>
</div>

<button class="back-btn" onclick="location.href='index.html'">Back</button>

<script>
/* PARTICLES */
const particleContainer = document.getElementById('particles');
for (let i = 0; i < 80; i++) {
  const p = document.createElement('div');
  p.classList.add('particle', Math.random() > 0.5 ? 'magenta' : 'white');
  const size = Math.random() * 4 + 2;
  p.style.width = p.style.height = size + 'px';
  p.style.left = Math.random() * window.innerWidth + 'px';
  p.style.top = Math.random() * window.innerHeight + 'px';
  p.style.animationDuration = (3 + Math.random() * 3) + 's';
  particleContainer.appendChild(p);
}

/* FORM SUBMIT */
const form = document.getElementById('contactForm');
const thankBox = document.getElementById('thankBox');
const title = document.getElementById('formTitle');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  /* REMOVE form completely */
  form.remove();

  /* REMOVE title */
  title.remove();

  /* SHOW thank you message */
  thankBox.style.display = 'block';
});
});
</script>

</body>
</html>
