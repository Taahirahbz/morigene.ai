<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact Form</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'IBM Plex Sans', sans-serif;
  background: url('images/halodna.jpg') center/cover no-repeat;
  display: flex;
  justify-content: flex-start;
  align-items: center;
}

/* ================= PARTICLES ================= */
#particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.8;
  animation: float 4s infinite ease-in-out;
}

.particle.white {
  background: white;
  box-shadow: 0 0 6px rgba(255,255,255,0.8);
}

.particle.magenta {
  background: #FF5AB1;
  box-shadow: 0 0 8px rgba(255,91,177,0.9);
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* ================= GLASS BOX ================= */
.form-container {
  position: relative;
  left: 1cm; /* 1cm from left edge */
  width: 428px; /* decreased 1cm per side */
  min-height: 428px; /* decreased by 1cm */
  padding: 2.5rem;
  background: rgba(255,255,255,0.12); /* frosted glass */
  backdrop-filter: blur(6px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.25);
  display: flex;
  flex-direction: column;
  align-items: center; /* center fields horizontally */
  justify-content: center; 
  z-index: 10;
  box-shadow: 0 0 30px rgba(255,255,255,0.1);
  animation: floatBox 8s ease-in-out infinite;
  transition: transform 0.3s ease;
}

.form-container:hover {
  transform: rotateY(5deg) rotateX(3deg);
  box-shadow: 0 0 35px rgba(255,91,177,0.6);
}

@keyframes floatBox {
  0%,100% { transform: translateY(0px) translateX(0px) rotateZ(0deg); }
  25% { transform: translateY(-6px) translateX(-2px) rotateZ(0.5deg); }
  50% { transform: translateY(3px) translateX(-1px) rotateZ(-0.5deg); }
  75% { transform: translateY(-4px) translateX(-3px) rotateZ(0.3deg); }
}

/* ================= FORM ================= */
h2 {
  color: #ffffff;
  margin: 0;
  text-align: center;
}

form {
  width: 100%;
  display: flex;
  flex-direction: column;
  margin-top: 0.8rem;
  align-items: center; /* center fields */
  animation: floatForm 8s ease-in-out infinite;
}

@keyframes floatForm {
  0%,100% { transform: translateY(0px); }
  25% { transform: translateY(-3px); }
  50% { transform: translateY(2px); }
  75% { transform: translateY(-2px); }
}

/* FIELD */
.field {
  width: 90%; /* less space at sides */
  margin-top: 0.8rem;
}

.field label {
  display: block;
  text-align: center;
  color: #ffffff;
  font-size: 0.95rem;
  margin-bottom: 0.2rem;
}

.field input,
.field textarea {
  width: 100%;
  padding: 0.7rem 1rem;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1); /* keep frosted glass */
  backdrop-filter: blur(6px);
  color: #ffffff; /* crisp text */
  outline: none;
  text-align: center; /* input text centered */
}

.field textarea {
  min-height: 95px;
  text-align: left;
}

.field input:focus,
.field textarea:focus {
  border: 1px solid rgba(255,91,177,0.9);
  box-shadow: 0 0 12px rgba(255,91,177,0.8);
  background: rgba(255,255,255,0.12); /* preserve frosted effect */
}

/* BUTTON */
button.send-btn {
  background: rgba(255,91,177,0.6);
  border: 1px solid rgba(255,91,177,0.7);
  padding: 0.7rem 2rem;
  border-radius: 50px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  width: 60%;
  align-self: center;
  margin-top: 1rem;
}

button.send-btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 0 25px rgba(255,91,177,0.7);
}

/* ================= THANK YOU ================= */
#thankBox {
  display: none;
  text-align: center;
  color: white;
  font-size: 1.1rem;
  font-weight: 500;
  align-self: center;
}

/* BACK BUTTON */
.back-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 0.7rem 1.5rem;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(6px);
  color: white;
  font-weight: 600;
  cursor: pointer;
  z-index: 10;
}

.back-btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 20px rgba(255,91,177,0.6);
}

/* MOBILE */
@media (max-width: 500px) {
  body { justify-content: center; }

  .form-container {
    width: 90vw;
    height: auto;
    left: 0;
  }
}
</style>
</head>
<body>

<div id="particles"></div>

<div class="form-container">
  <h2 id="formTitle">Contact Us</h2>

  <form id="contactForm">
    <div class="field">
      <label>Name</label>
      <input type="text" required>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" required>
    </div>

    <div class="field">
      <label>Subject</label>
      <input type="text" required>
    </div>

    <div class="field">
      <label>Message</label>
      <textarea required></textarea>
    </div>

    <button type="submit" class="send-btn">Send</button>
  </form>

  <div id="thankBox">
    Thank you for contacting Morigene, we shall get back to you shortly!
  </div>
</div>

<button class="back-btn" onclick="location.href='index.html'">Back</button>

<script>
/* ================= FLOATING PARTICLES ================= */
const particleContainer = document.getElementById('particles');
for (let i = 0; i < 80; i++) {
  const p = document.createElement('div');
  p.classList.add('particle', Math.random() > 0.5 ? 'magenta' : 'white');
  const size = Math.random() * 4 + 2;
  p.style.width = p.style.height = size + 'px';
  p.style.left = Math.random() * window.innerWidth + 'px';
  p.style.top = Math.random() * window.innerHeight + 'px';
  p.style.animationDuration = (3 + Math.random() * 3) + 's';
  particleContainer.appendChild(p);
}

/* ================= FORM SUBMISSION ================= */
const form = document.getElementById('contactForm');
const thankBox = document.getElementById('thankBox');
const title = document.getElementById('formTitle');

form.addEventListener('submit', function(e) {
  e.preventDefault();
  form.remove();
  title.remove();
  thankBox.style.display = 'block';
});
</script>

</body>
</html>
